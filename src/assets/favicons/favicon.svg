<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1B4332"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="128" height="128" rx="24"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="24" fill="url(#bgGrad)"/>

  <!-- Gold accent bar at bottom -->
  <rect x="0" y="100" width="128" height="28" fill="#E9A227" clip-path="url(#roundClip)"/>

  <!-- "A" — drawn as paths for crisp rendering at all sizes -->
  <!-- Left leg -->
  <polygon points="22,94 38,30 46,30 32,94" fill="white"/>
  <!-- Right leg -->
  <polygon points="54,30 62,30 48,94 40,94" fill="white"/>
  <!-- Crossbar -->
  <rect x="28" y="66" width="26" height="8" rx="2" fill="white"/>

  <!-- "J" -->
  <!-- Vertical stem -->
  <rect x="70" y="30" width="12" height="52" rx="4" fill="#E9A227"/>
  <!-- Curl bottom-left -->
  <path d="M82 82 Q82 102 68 102 Q58 102 56 92 L64 90 Q64 96 68 96 Q76 96 76 82 Z" fill="#E9A227"/>
  <!-- Top serif bar -->
  <rect x="64" y="30" width="22" height="10" rx="3" fill="#E9A227"/>
</svg>
